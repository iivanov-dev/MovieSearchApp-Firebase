<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/reset.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;700&family=Roboto:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./styles/index.css" />
    <title>Movie Search App</title>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <h1>Movie Search App</h1>
        <button class="js-login-btn search-btn">Login</button>
        <button class="js-register-btn search-btn">Register</button>
        
        <button class="js-delete-user-btn search-btn">Delete User</button>
        <button class="js-logout-btn search-btn">Logout</button>

        <!-- <a href="/src/components/auth/auth.html" class="js-auth-page-btn search-btn">Sign in</a> -->
        <span class="auth-status js-auth-status">Not authorized</span>

      </div>
    </header>

    <main class="main">
      <div class="container">
        <section class="movies-section">
          <div class="search-section">
            <input
              class="js-search-input search-input"
              type="text"
              placeholder="Movie name"
            />
            <button class="js-search-btn search-btn">Search</button>
            <button class="js-delete-films-btn search-btn">Delete all films</button>
          </div>

          <div class="js-no-movies no-movies"></div>
          <div class="js-movies movies"></div>
        </section>
      </div>
    </main>

    <footer class="footer" role="contentinfo">
      <div class="container">footer</div>
    </footer>

    <script type="module" src="./scripts/index.js"></script>
  </body>
</html>
